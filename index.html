  { symbol: "DIS",  name: "The Walt Disney Co.", price: 111.52, change: -1.07, changePercent: -0.95, type: "stock" },
];

  { symbol: "LINK", name: "Chainlink", price: 14.82, change: 0.43, changePercent: 2.99, type: "crypto" },

const FINNHUB_KEY = "d70spb1r01ql6rg0hrrgd70spb1r01ql6rg0hrs0";

// CoinGecko IDs for crypto symbols
const COINGECKO_IDS = {
  LINK:"chainlink", BTC:"bitcoin", ETH:"ethereum", SOL:"solana",
  BNB:"binancecoin", XRP:"ripple", DOGE:"dogecoin", ADA:"cardano", AVAX:"avalanche-2",

  { symbol: "AAPL",  name: "Apple Inc.",            price: 227.52,  type: "stock"  },
  { symbol: "TSLA",  name: "Tesla Inc.",             price: 248.71,  type: "stock"  },

  { symbol: "NVDA",  name: "NVIDIA Corp.",           price: 875.40,  type: "stock"  },

  { symbol: "PYPL",  name: "PayPal Holdings",        price: 68.30,   type: "stock"  },

  { symbol: "ADA",   name: "Cardano",                price: 0.451,   type: "crypto" },
  { symbol: "AVAX",  name: "Avalanche",              price: 37.80,   type: "crypto" },
];
const NEWS = [
  { id:1, symbol:"ASML", title:"ASML Reports Record EUV Backlog Amid AI Chip Surge",
    summary:"ASML's extreme ultraviolet lithography machines are in unprecedented demand as chipmakers race to build AI-capable fabs. The company's order book has swelled to record highs, with delivery slots booked well into 2027.",

  { id:2, symbol:"DIS", title:"Disney+ Subscriber Growth Beats Estimates in Q2",
    summary:"Walt Disney reported stronger-than-expected Disney+ subscriber additions, driven by password-sharing crackdowns and new content releases. The parks division also posted record revenue.",
    advice:"Cautiously bullish. Streaming profitability is improving and parks remain a cash cow. However, cord-cutting headwinds in the linear TV segment persist. A solid hold for patient investors.",

  { id:3, symbol:"LINK", title:"Chainlink Expands Real-World Asset Oracle Network",

    advice:"Short-term headwind. China has historically represented a notable portion of ASML's sales. However, demand from TSMC, Samsung, and Intel more than offsets any China exposure loss. Hold and monitor policy developments.",

  { id:6, symbol:"LINK", title:"LINK Surges as DeFi TVL Hits 2-Year High",

    advice:"Bullish. Rising DeFi activity directly increases Chainlink's utility and fee revenue. If TVL growth continues, LINK is well positioned for further gains. Consider a gradual accumulation strategy.",
    time:"11h ago", sentiment:"positive" },
];
const INIT_ALERTS = [
  { id:1, symbol:"ASML", condition:"above", target:760,  active:true  },
  { id:2, symbol:"DIS",  condition:"below", target:108,  active:true  },
  { id:3, symbol:"LINK", condition:"above", target:16,   active:false },
];
const CURRENCIES = [
  { code:"USD", symbol:"$",   rate:1     },
  { code:"EUR", symbol:"€",   rate:0.92  },
  { code:"GBP", symbol:"£",   rate:0.79  },
  { code:"JPY", symbol:"¥",   rate:149.5 },
  { code:"CAD", symbol:"CA$", rate:1.36  },
  { code:"AUD", symbol:"A$",  rate:1.53  },
  { code:"CHF", symbol:"Fr",  rate:0.90  },
  { code:"INR", symbol:"₹",   rate:83.1  },
];
const sentimentColor = { positive:"#22c55e", negative:"#ef4444", neutral:"#f59e0b" };
const sentimentBg    = { positive:"#052e16", negative:"#450a0a", neutral:"#431407" };

const makeFmt = (currency) => (n, crypto=false) => {
  const v = n * currency.rate;
  const s = currency.symbol;
  return (crypto && v > 1000)
    ? s + v.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})
    : s + v.toFixed(2);
};

function AssetCard({ asset, onRemove, holding, onHoldingChange, fmt }) {
  const up = asset.change >= 0;
  const qty = parseFloat(holding) || 0;
  const holdingValue  = qty > 0 ? asset.price * qty : null;
  const holdingChange = qty > 0 ? asset.change * qty : null;
  const isCrypto = asset.type === "crypto";
  return (
    <div style={{ background:"#111822", border:"1px solid #1a2332", borderRadius:12, padding:"12px 14px", marginBottom:8 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ width:38, height:38, borderRadius:10, background:up?"#052e16":"#450a0a",
            border:`1px solid ${up?"#22c55e33":"#ef444433"}`, display:"flex", alignItems:"center",
            justifyContent:"center", fontFamily:"'Syne',sans-serif", fontSize:11, fontWeight:800,
            color:up?"#22c55e":"#ef4444", flexShrink:0 }}>
            {asset.symbol.slice(0,3)}
          </div>
          <div>
            <div style={{ fontFamily:"'Syne',sans-serif", fontSize:14, fontWeight:700, color:"#e2f0ff" }}>{asset.symbol}</div>
            <div style={{ fontSize:11, color:"#4a6080" }}>{asset.name}</div>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:14, fontWeight:500, color:"#e2f0ff" }}>{fmt(asset.price, isCrypto)}</div>
            <div style={{ fontSize:11, color:up?"#22c55e":"#ef4444" }}>
              {up?"▲":"▼"} {Math.abs(asset.changePercent).toFixed(2)}%
            </div>
          </div>
          {onRemove && (
            <button onClick={onRemove} style={{ background:"none", border:"1px solid #1a2332", color:"#4a6080",
              borderRadius:6, width:24, height:24, cursor:"pointer", fontSize:12,
              display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>✕</button>
          )}
        </div>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:8, borderTop:"1px solid #1a2332", paddingTop:9 }}>
        <div style={{ fontSize:11, color:"#4a6080", flexShrink:0 }}>
          {isCrypto ? "Units owned:" : "Shares owned:"}
        </div>
        <input type="number" min="0" value={holding} onChange={e=>onHoldingChange(e.target.value)}
          placeholder="0" style={{ width:90, background:"#0d1117", border:"1px solid #1a2a3a",
            color:"#e2f0ff", borderRadius:6, padding:"4px 8px", fontSize:12, textAlign:"right" }} />
        {holdingValue !== null ? (
          <div style={{ marginLeft:"auto", textAlign:"right" }}>
            <div style={{ fontSize:13, fontWeight:500, color:"#e2f0ff" }}>{fmt(holdingValue)}</div>
            <div style={{ fontSize:11, color:up?"#22c55e":"#ef4444" }}>
              {holdingChange >= 0 ? "+" : ""}{fmt(holdingChange)} today
            </div>
          </div>
        ) : (
          <div style={{ marginLeft:"auto", fontSize:11, color:"#2a3a4a" }}>Enter quantity to see value</div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab]                   = useState("portfolio");
  const [assets, setAssets]             = useState([...STOCKS, ...CRYPTOS]);
  const [alerts, setAlerts]             = useState(INIT_ALERTS);
  const [notification, setNotification] = useState(null);
  const [addAlertModal, setAddAlertModal]   = useState(false);
  const [newAlert, setNewAlert]             = useState({ symbol:"ASML", target:"" });
  const [selectedNews, setSelectedNews]     = useState(null);
  const [ticker, setTicker]                 = useState(0);
  const [addAssetModal, setAddAssetModal]   = useState(false);
  const [assetSearch, setAssetSearch]       = useState("");
  const [confirmRemove, setConfirmRemove]   = useState(null);
  const [editAlert, setEditAlert]           = useState(null);
  const [dragAlert, setDragAlert]           = useState(null);
  const [holdings, setHoldings]             = useState({ ASML:"", DIS:"", LINK:"" });
  const [currencyCode, setCurrencyCode]     = useState("CAD");
  const [showCurrencyPicker, setShowCurrencyPicker] = useState(false);

  const soundLoopRef = useRef(null);
  const currency = CURRENCIES.find(c => c.code === currencyCode);
  const fmt = makeFmt(currency);

  const [priceStatus, setPriceStatus] = useState("loading"); // "loading" | "live" | "error"
  const [lastUpdated, setLastUpdated] = useState(null);

  const fetchPrices = useCallback(async () => {
    try {
      // --- Stocks via Finnhub ---
      const stockSymbols = assets.filter(a=>a.type==="stock").map(a=>a.symbol);
      const stockResults = await Promise.all(stockSymbols.map(async sym => {
        const [quoteRes, profileRes] = await Promise.all([
          fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${FINNHUB_KEY}`),
          fetch(`https://finnhub.io/api/v1/stock/profile2?symbol=${sym}&token=${FINNHUB_KEY}`)
        ]);
        const quote   = await quoteRes.json();
        const profile = await profileRes.json();
        if (!quote.c) return null;
        return {
          symbol: sym,
          price: quote.c,
          change: quote.d,
          changePercent: quote.dp,
          name: profile.name || sym,
          type: "stock",
        };
      }));

      // --- Crypto via CoinGecko ---
      const cryptoAssets = assets.filter(a=>a.type==="crypto");
      const cgIds = cryptoAssets.map(a=>COINGECKO_IDS[a.symbol]).filter(Boolean).join(",");
      let cryptoResults = [];
      if (cgIds) {
        const cgRes  = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${cgIds}&vs_currencies=usd&include_24hr_change=true&include_24hr_vol=true`);
        const cgData = await cgRes.json();
        cryptoResults = cryptoAssets.map(a => {
          const id   = COINGECKO_IDS[a.symbol];
          const data = cgData[id];
          if (!data) return null;
          const price  = data.usd;
          const pct    = data.usd_24h_change || 0;
          const change = price / (1 + pct/100) * (pct/100);
          return { ...a, price, change, changePercent: pct };
        });
      }

      const allResults = [...stockResults, ...cryptoResults].filter(Boolean);
      if (allResults.length === 0) { setPriceStatus("error"); return; }

      setAssets(prev => prev.map(a => {
        const updated = allResults.find(r=>r.symbol===a.symbol);
        return updated ? { ...a, ...updated } : a;
      }));

      // Also update KNOWN_ASSETS prices in memory for the add modal
      allResults.forEach(r => {
        const ka = KNOWN_ASSETS.find(k=>k.symbol===r.symbol);
        if (ka) ka.price = r.price;
      });

      setPriceStatus("live");
      setLastUpdated(new Date());
      setTicker(t=>t+1);
    } catch(e) {
      console.error("Price fetch error:", e);
      setPriceStatus("error");
    }
  }, [assets]);

  // Fetch on mount and every 60 seconds
  useEffect(() => {
    fetchPrices();
    const id = setInterval(fetchPrices, 60000);
    return () => clearInterval(id);
  }, []);

  const playDing = useCallback(() => {
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      const note = (freq, t, dur) => {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type="sine"; o.frequency.setValueAtTime(freq,t);
        g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
        o.start(t); o.stop(t+dur);
      };
      note(880,  ctx.currentTime,      0.3);
      note(1100, ctx.currentTime+0.15, 0.3);
      note(1320, ctx.currentTime+0.3,  0.5);
    } catch(e){}
  },[]);

  const playBuzzer = useCallback(() => {
    try {
      const ctx = new (window.AudioContext||window.webkitAudioContext)();
      const buzz = (t) => {
        const o=ctx.createOscillator(), g=ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type="sawtooth"; o.frequency.setValueAtTime(220,t);
        o.frequency.linearRampToValueAtTime(80,t+0.4);
        g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5);
        o.start(t); o.stop(t+0.5);
      };
      buzz(ctx.currentTime); buzz(ctx.currentTime+0.55);
    } catch(e){}
  },[]);

  const startSoundLoop = useCallback((type) => {
    if (soundLoopRef.current) clearInterval(soundLoopRef.current);
    const fn = type==="above" ? playDing : playBuzzer;
    fn();
    soundLoopRef.current = setInterval(fn, 2500);
  },[playDing, playBuzzer]);

  const stopSoundLoop = useCallback(() => {
    if (soundLoopRef.current) { clearInterval(soundLoopRef.current); soundLoopRef.current=null; }
  },[]);

  const dismissNotification = useCallback(() => {
    stopSoundLoop(); setNotification(null);
  },[stopSoundLoop]);

  // Check alerts
  useEffect(() => {
    alerts.forEach(alert => {
      if (!alert.active) return;
      const asset = assets.find(a => a.symbol===alert.symbol);
      if (!asset) return;
      const triggered = (alert.condition==="above" && asset.price>=alert.target)
                     || (alert.condition==="below" && asset.price<=alert.target);
      if (triggered) {
        setNotification(prev => {
          if (prev?.symbol===alert.symbol && prev?.condition===alert.condition) return prev;
          startSoundLoop(alert.condition);
          return {
            symbol: alert.symbol, condition: alert.condition,
            message: `${alert.symbol} ${alert.condition==="above"?"reached":"dropped to"} ${fmt(alert.target, asset.type==="crypto")}`,
            price: fmt(asset.price, asset.type==="crypto"),
          };
        });
      }
    });
  }, [ticker]);

  // Portfolio totals
  const totalValue  = assets.reduce((s,a)=>{ const q=parseFloat(holdings[a.symbol])||0; return s+(q>0?a.price*q:0); },0);
  const totalChange = assets.reduce((s,a)=>{ const q=parseFloat(holdings[a.symbol])||0; return s+(q>0?a.change*q:0); },0);
  const totalChangePct = totalValue-totalChange>0 ? (totalChange/(totalValue-totalChange))*100 : 0;
  const hasAnyHoldings = assets.some(a => parseFloat(holdings[a.symbol])>0);

  // Alert helpers
  const removeAlert  = id => setAlerts(prev=>prev.filter(a=>a.id!==id));
  const toggleAlert  = id => setAlerts(prev=>prev.map(a=>a.id===id?{...a,active:!a.active}:a));
  const reorderAlerts = (fromId, toId) => {
    if (fromId===toId) return;
    setAlerts(prev=>{
      const arr=[...prev];
      const fi=arr.findIndex(a=>a.id===fromId), ti=arr.findIndex(a=>a.id===toId);
      const [item]=arr.splice(fi,1); arr.splice(ti,0,item); return arr;
    });
  };
  const updateAlertTarget = () => {
    if (!editAlert||!editAlert.target) return;
    const target=parseFloat(editAlert.target);
    setAlerts(prev=>prev.map(a=>{
      if (a.id!==editAlert.id) return a;
      const asset=assets.find(x=>x.symbol===a.symbol);
      return { ...a, target, condition: asset&&target>=asset.price?"above":"below" };
    }));
    setEditAlert(null);
  };
  const addAlert = () => {
    if (!newAlert.target) return;
    const target=parseFloat(newAlert.target);
    const asset=assets.find(a=>a.symbol===newAlert.symbol);
    const condition=asset&&target>=asset.price?"above":"below";
    setAlerts(prev=>[...prev,{...newAlert,id:Date.now(),target,condition,active:true}]);
    setAddAlertModal(false);
    setNewAlert({ symbol:assets[0]?.symbol||"ASML", target:"" });
  };

  // Asset helpers
  const addAsset = known => {
    if (assets.find(a=>a.symbol===known.symbol)) return;
    setAssets(prev=>[...prev,{...known,change:0,changePercent:0}]);
    setAddAssetModal(false); setAssetSearch("");
  };
  const removeAsset = symbol => {
    setAssets(prev=>prev.filter(a=>a.symbol!==symbol));
    setAlerts(prev=>prev.filter(a=>a.symbol!==symbol));
    setConfirmRemove(null);
  };

  const filteredKnown = KNOWN_ASSETS.filter(k =>
    !assets.find(a=>a.symbol===k.symbol) &&
    (k.symbol.toLowerCase().includes(assetSearch.toLowerCase()) ||
     k.name.toLowerCase().includes(assetSearch.toLowerCase()))
  );
  const allSymbols = assets.map(a=>a.symbol);

  return (
    <div style={{ fontFamily:"'DM Mono','Courier New',monospace", background:"#080c14",
      minHeight:"100vh", display:"flex", justifyContent:"center", alignItems:"flex-start", padding:"20px 0" }}>

      {/* Phone shell */}
      <div style={{ width:390, minHeight:780, background:"#0d1117", borderRadius:44, overflow:"hidden",
        boxShadow:"0 0 0 1px #1e2a3a, 0 40px 120px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05)",
        position:"relative", display:"flex", flexDirection:"column" }}>

        {/* Status bar */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
          padding:"14px 28px 0", color:"#fff", fontSize:12, fontWeight:500 }}>
          <span>9:41</span>
          <div style={{ width:120, height:30, background:"#0d1117", borderRadius:20,
            position:"absolute", left:"50%", transform:"translateX(-50%)", top:0 }} />
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            <span>●●●</span><span>WiFi</span><span>🔋</span>
          </div>
        </div>

        {/* Header */}
        <div style={{ padding:"16px 24px 12px", borderBottom:"1px solid #1a2332", position:"relative" }}>
          {showCurrencyPicker && (
            <div onClick={()=>setShowCurrencyPicker(false)}
              style={{ position:"fixed", inset:0, zIndex:199 }} />
          )}
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <div>
              <div style={{ fontFamily:"'Syne',sans-serif", fontSize:22, fontWeight:800, color:"#e2f0ff", letterSpacing:-0.5 }}>
                HOL<span style={{ color:"#3b82f6" }}>DINGO</span>
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:6, marginTop:4 }}>
                <button onClick={()=>setShowCurrencyPicker(p=>!p)} style={{ background:"#1a2a3a",
                  border:"1px solid #2a3a4a", color:"#60a5fa", borderRadius:6, padding:"2px 7px",
                  fontSize:10, cursor:"pointer", fontFamily:"'DM Mono',monospace", letterSpacing:0.5 }}>
                  {currencyCode} ▾
                </button>
                <button onClick={fetchPrices} title="Refresh prices" style={{ background:"#1a2a3a",
                  border:"1px solid #2a3a4a", color:"#60a5fa", borderRadius:6, padding:"2px 7px",
                  fontSize:12, cursor:"pointer" }}>⟳</button>
              </div>
              {showCurrencyPicker && (
                <div style={{ position:"absolute", top:72, left:24, zIndex:200, background:"#111822",
                  border:"1px solid #1a2a3a", borderRadius:12, padding:8,
                  display:"flex", flexDirection:"column", gap:2, boxShadow:"0 8px 32px rgba(0,0,0,0.6)" }}>
                  {CURRENCIES.map(c=>(
                    <button key={c.code} onClick={()=>{ setCurrencyCode(c.code); setShowCurrencyPicker(false); }}
                      style={{ background:c.code===currencyCode?"#1a3a6a":"none", border:"none", borderRadius:8,
                        padding:"6px 14px", color:c.code===currencyCode?"#60a5fa":"#94a3b8",
                        cursor:"pointer", fontSize:12, textAlign:"left", fontFamily:"'DM Mono',monospace" }}>
                      <span style={{ color:"#4a6080", marginRight:6 }}>{c.symbol}</span>{c.code}
                    </button>
                  ))}
                </div>
              )}
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:11, color:"#4a6080", display:"flex", alignItems:"center", justifyContent:"flex-end", gap:5 }}>
                <span style={{ width:6, height:6, borderRadius:"50%", display:"inline-block",
                  background: priceStatus==="live"?"#22c55e": priceStatus==="error"?"#ef4444":"#f59e0b",

              <span style={{ fontSize:20 }}>{t.icon}</span>
              <span style={{ fontSize:10, color:tab===t.key?"#3b82f6":"#4a6080" }}>{t.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
