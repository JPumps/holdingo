var NEWS = [

var sentimentColor = { positive:"#22c55e", negative:"#ef4444", neutral:"#f59e0b" };
var sentimentBg    = { positive:"#052e16", negative:"#450a0a", neutral:"#431407" };

function makeFmt(currency) {
  return function(n, crypto) {
    var v = n * currency.rate;
    var s = currency.symbol;
    if (crypto && v > 1000)
      return s + v.toLocaleString("en-US", { minimumFractionDigits:2, maximumFractionDigits:2 });
    return s + v.toFixed(2);
  };
}

function AssetCard(props) {
  var asset = props.asset;
  var onRemove = props.onRemove;
  var holding = props.holding;
  var onHoldingChange = props.onHoldingChange;
  var fmt = props.fmt;
  var up = asset.change >= 0;
  var qty = parseFloat(holding) || 0;
  var holdingValue  = qty > 0 ? asset.price * qty : null;
  var holdingChange = qty > 0 ? asset.change * qty : null;
  var isCrypto = asset.type === "crypto";
  return (
    <div style={{ background:"#111822", border:"1px solid #1a2332", borderRadius:12, padding:"12px 14px", marginBottom:8 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <div style={{ width:38, height:38, borderRadius:10,
            background:up ? "#052e16" : "#450a0a",
            border:"1px solid " + (up ? "#22c55e33" : "#ef444433"),
            display:"flex", alignItems:"center", justifyContent:"center",
            fontFamily:"'Syne',sans-serif", fontSize:11, fontWeight:800,
            color:up ? "#22c55e" : "#ef4444", flexShrink:0 }}>
            {asset.symbol.slice(0,3)}
          </div>
          <div>
            <div style={{ fontFamily:"'Syne',sans-serif", fontSize:14, fontWeight:700, color:"#e2f0ff" }}>{asset.symbol}</div>
            <div style={{ fontSize:11, color:"#4a6080" }}>{asset.name}</div>
          </div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div style={{ textAlign:"right" }}>
            <div style={{ fontSize:14, fontWeight:500, color:"#e2f0ff" }}>{fmt(asset.price, isCrypto)}</div>
            <div style={{ fontSize:11, color:up ? "#22c55e" : "#ef4444" }}>
              {up ? "▲" : "▼"} {Math.abs(asset.changePercent).toFixed(2)}%
            </div>
          </div>
          {onRemove && (
            <button onClick={onRemove} style={{ background:"none", border:"1px solid #1a2332", color:"#4a6080",
              borderRadius:6, width:24, height:24, cursor:"pointer", fontSize:12,
              display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>x</button>
          )}
        </div>
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:8, borderTop:"1px solid #1a2332", paddingTop:9 }}>
        <div style={{ fontSize:11, color:"#4a6080", flexShrink:0 }}>
          {isCrypto ? "Units owned:" : "Shares owned:"}
        </div>
        <input type="number" min="0" value={holding}
          onChange={function(e){ onHoldingChange(e.target.value); }}
          placeholder="0"
          style={{ width:90, background:"#0d1117", border:"1px solid #1a2a3a",
            color:"#e2f0ff", borderRadius:6, padding:"4px 8px", fontSize:12, textAlign:"right" }} />
        {holdingValue !== null ? (
          <div style={{ marginLeft:"auto", textAlign:"right" }}>
            <div style={{ fontSize:13, fontWeight:500, color:"#e2f0ff" }}>{fmt(holdingValue)}</div>
            <div style={{ fontSize:11, color:up ? "#22c55e" : "#ef4444" }}>
              {holdingChange >= 0 ? "+" : ""}{fmt(holdingChange)} today
            </div>
          </div>
        ) : (
          <div style={{ marginLeft:"auto", fontSize:11, color:"#2a3a4a" }}>Enter quantity to see value</div>
        )}
      </div>
    </div>
  );
}

function App() {
  var s1  = useState("portfolio");      var tab = s1[0]; var setTab = s1[1];
  var s2  = useState(STOCKS.concat(CRYPTOS)); var assets = s2[0]; var setAssets = s2[1];
  var s3  = useState(INIT_ALERTS);      var alerts = s3[0]; var setAlerts = s3[1];
  var s4  = useState(null);             var notification = s4[0]; var setNotification = s4[1];
  var s5  = useState(false);            var addAlertModal = s5[0]; var setAddAlertModal = s5[1];
  var s6  = useState({symbol:"ASML",target:""}); var newAlert = s6[0]; var setNewAlert = s6[1];
  var s7  = useState(null);             var selectedNews = s7[0]; var setSelectedNews = s7[1];
  var s8  = useState(0);                var ticker = s8[0]; var setTicker = s8[1];
  var s9  = useState(false);            var addAssetModal = s9[0]; var setAddAssetModal = s9[1];
  var s10 = useState("");               var assetSearch = s10[0]; var setAssetSearch = s10[1];
  var s11 = useState(null);             var confirmRemove = s11[0]; var setConfirmRemove = s11[1];
  var s12 = useState(null);             var editAlert = s12[0]; var setEditAlert = s12[1];
  var s13 = useState(null);             var dragAlert = s13[0]; var setDragAlert = s13[1];
  var s14 = useState({ASML:"",DIS:"",LINK:""}); var holdings = s14[0]; var setHoldings = s14[1];
  var s15 = useState("CAD");            var currencyCode = s15[0]; var setCurrencyCode = s15[1];
  var s16 = useState(false);            var showCurrencyPicker = s16[0]; var setShowCurrencyPicker = s16[1];
  var s17 = useState("loading");        var priceStatus = s17[0]; var setPriceStatus = s17[1];
  var s18 = useState(null);             var lastUpdated = s18[0]; var setLastUpdated = s18[1];

  var soundLoopRef = useRef(null);
  var assetsRef    = useRef(assets);

  useEffect(function() { assetsRef.current = assets; }, [assets]);

  var currency = null;
  for (var ci = 0; ci < CURRENCIES.length; ci++) {
    if (CURRENCIES[ci].code === currencyCode) { currency = CURRENCIES[ci]; break; }
  }
  var fmt = makeFmt(currency);

  var fetchPrices = useCallback(function() {
    var cur = assetsRef.current;
    var stockSymbols = cur.filter(function(a){ return a.type === "stock"; }).map(function(a){ return a.symbol; });
    var cryptoAssets = cur.filter(function(a){ return a.type === "crypto"; });
    var cgIds = cryptoAssets.map(function(a){ return COINGECKO_IDS[a.symbol] || ""; }).filter(function(id){ return id !== ""; }).join(",");

    var stockPromises = stockSymbols.map(function(sym) {
      var quoteUrl   = "https://finnhub.io/api/v1/quote?symbol=" + sym + "&token=" + FINNHUB_KEY;
      var profileUrl = "https://finnhub.io/api/v1/stock/profile2?symbol=" + sym + "&token=" + FINNHUB_KEY;
      return Promise.all([
        fetch(quoteUrl).then(function(r){ return r.json(); }),
        fetch(profileUrl).then(function(r){ return r.json(); })
      ]).then(function(res) {
        var quote = res[0]; var profile = res[1];
        if (!quote || !quote.c) return null;
        return { symbol:sym, price:quote.c, change:quote.d || 0, changePercent:quote.dp || 0,
                 name:profile.name || sym, type:"stock" };
      }).catch(function() { return null; });
    });

    var cryptoPromise = cgIds
      ? fetch("https://api.coingecko.com/api/v3/simple/price?ids=" + cgIds + "&vs_currencies=usd&include_24hr_change=true")
          .then(function(r) { return r.json(); })
          .then(function(cgData) {
            return cryptoAssets.map(function(a) {
              var id = COINGECKO_IDS[a.symbol];
              var data = id ? cgData[id] : null;
              if (!data) return null;
              var price = data.usd;
              var pct   = data.usd_24h_change || 0;
              var change = (price / (1 + pct / 100)) * (pct / 100);
              return { symbol:a.symbol, name:a.name, type:"crypto", price:price, change:change, changePercent:pct };
            });
          }).catch(function() { return []; })
      : Promise.resolve([]);

    Promise.all([Promise.all(stockPromises), cryptoPromise])
      .then(function(res) {
        var all = res[0].concat(res[1]).filter(function(r){ return r !== null; });
        if (all.length === 0) { setPriceStatus("error"); return; }
        setAssets(function(prev) {
          return prev.map(function(a) {
            var u = null;
            for (var i = 0; i < all.length; i++) { if (all[i].symbol === a.symbol) { u = all[i]; break; } }
            if (!u) return a;
            return { symbol:a.symbol, name:u.name||a.name, type:a.type, price:u.price, change:u.change, changePercent:u.changePercent };
          });
        });
        for (var i = 0; i < all.length; i++) {
          for (var j = 0; j < KNOWN_ASSETS.length; j++) {
            if (KNOWN_ASSETS[j].symbol === all[i].symbol) { KNOWN_ASSETS[j].price = all[i].price; break; }
          }
        }
        setPriceStatus("live");
        setLastUpdated(new Date());
        setTicker(function(t) { return t + 1; });
      })
      .catch(function() { setPriceStatus("error"); });
  }, []);

  useEffect(function() {
    fetchPrices();
    var id = setInterval(fetchPrices, 60000);
    return function() { clearInterval(id); };
  }, []);

  var playDing = useCallback(function() {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      function note(freq, t, dur) {
        var o = ctx.createOscillator(); var g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = "sine"; o.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(0.4, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        o.start(t); o.stop(t + dur);
      }
      note(880,  ctx.currentTime,       0.3);
      note(1100, ctx.currentTime + 0.15, 0.3);
      note(1320, ctx.currentTime + 0.3,  0.5);
    } catch(e) {}
  }, []);

  var playBuzzer = useCallback(function() {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      function buzz(t) {
        var o = ctx.createOscillator(); var g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = "sawtooth"; o.frequency.setValueAtTime(220, t);
        o.frequency.linearRampToValueAtTime(80, t + 0.4);
        g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        o.start(t); o.stop(t + 0.5);
      }
      buzz(ctx.currentTime); buzz(ctx.currentTime + 0.55);
    } catch(e) {}
  }, []);

  var startSoundLoop = useCallback(function(type) {
    if (soundLoopRef.current) clearInterval(soundLoopRef.current);
    var fn = type === "above" ? playDing : playBuzzer;
    fn();
    soundLoopRef.current = setInterval(fn, 2500);
  }, [playDing, playBuzzer]);

  var stopSoundLoop = useCallback(function() {
    if (soundLoopRef.current) { clearInterval(soundLoopRef.current); soundLoopRef.current = null; }
  }, []);

  var dismissNotification = useCallback(function() {
    stopSoundLoop(); setNotification(null);
  }, [stopSoundLoop]);

  useEffect(function() {
    for (var i = 0; i < alerts.length; i++) {
      var alert = alerts[i];
      if (!alert.active) continue;
      var asset = null;
      for (var j = 0; j < assets.length; j++) { if (assets[j].symbol === alert.symbol) { asset = assets[j]; break; } }
      if (!asset) continue;
      var triggered = (alert.condition === "above" && asset.price >= alert.target)
                   || (alert.condition === "below" && asset.price <= alert.target);
      if (triggered) {
        var _alert = alert; var _asset = asset;
        setNotification(function(prev) {
          if (prev && prev.symbol === _alert.symbol && prev.condition === _alert.condition) return prev;
          startSoundLoop(_alert.condition);
          return {
            symbol: _alert.symbol,
            condition: _alert.condition,
            message: _alert.symbol + " " + (_alert.condition === "above" ? "reached" : "dropped to") + " " + fmt(_alert.target, _asset.type === "crypto"),
            price: fmt(_asset.price, _asset.type === "crypto")
          };
        });
      }
    }
  }, [ticker]);

  var totalValue = 0; var totalChange = 0;
  for (var ai = 0; ai < assets.length; ai++) {
    var qty = parseFloat(holdings[assets[ai].symbol]) || 0;
    if (qty > 0) { totalValue += assets[ai].price * qty; totalChange += assets[ai].change * qty; }
  }
  var totalChangePct = totalValue - totalChange > 0 ? (totalChange / (totalValue - totalChange)) * 100 : 0;
  var hasAnyHoldings = false;
  for (var hi = 0; hi < assets.length; hi++) { if (parseFloat(holdings[assets[hi].symbol]) > 0) { hasAnyHoldings = true; break; } }

  function removeAlertFn(id)  { setAlerts(function(prev){ return prev.filter(function(a){ return a.id !== id; }); }); }
  function toggleAlertFn(id)  { setAlerts(function(prev){ return prev.map(function(a){ return a.id === id ? Object.assign({}, a, {active:!a.active}) : a; }); }); }

  function reorderAlerts(fromId, toId) {
    if (fromId === toId) return;
    setAlerts(function(prev) {
      var arr = prev.slice();
      var fi = -1; var ti = -1;
      for (var i = 0; i < arr.length; i++) { if (arr[i].id === fromId) fi = i; if (arr[i].id === toId) ti = i; }
      var item = arr.splice(fi, 1)[0]; arr.splice(ti, 0, item); return arr;
    });
  }

  function updateAlertTarget() {
    if (!editAlert || !editAlert.target) return;
    var target = parseFloat(editAlert.target);
    var eid = editAlert.id;
    setAlerts(function(prev) {
      return prev.map(function(a) {
        if (a.id !== eid) return a;
        var asset = null;
        for (var i = 0; i < assets.length; i++) { if (assets[i].symbol === a.symbol) { asset = assets[i]; break; } }
        var cond = asset && target >= asset.price ? "above" : "below";
        return Object.assign({}, a, { target:target, condition:cond });
      });
    });
    setEditAlert(null);
  }

  function addAlertFn() {
    if (!newAlert.target) return;
    var target = parseFloat(newAlert.target);
    var asset = null;
    for (var i = 0; i < assets.length; i++) { if (assets[i].symbol === newAlert.symbol) { asset = assets[i]; break; } }
    var cond = asset && target >= asset.price ? "above" : "below";
    var sym = newAlert.symbol;
    setAlerts(function(prev) { return prev.concat([{ id:Date.now(), symbol:sym, target:target, condition:cond, active:true }]); });
    setAddAlertModal(false);
    setNewAlert({ symbol: assets.length > 0 ? assets[0].symbol : "ASML", target:"" });
  }

  function addAssetFn(known) {
    for (var i = 0; i < assets.length; i++) { if (assets[i].symbol === known.symbol) return; }
    var newA = { symbol:known.symbol, name:known.name, price:known.price, change:0, changePercent:0, type:known.type };
    setAssets(function(prev) { return prev.concat([newA]); });
    setAddAssetModal(false); setAssetSearch("");
  }

  function removeAssetFn(symbol) {
    setAssets(function(prev) { return prev.filter(function(a){ return a.symbol !== symbol; }); });
    setAlerts(function(prev) { return prev.filter(function(a){ return a.symbol !== symbol; }); });
    setConfirmRemove(null);
  }

  var filteredKnown = KNOWN_ASSETS.filter(function(k) {
    var inPortfolio = false;
    for (var i = 0; i < assets.length; i++) { if (assets[i].symbol === k.symbol) { inPortfolio = true; break; } }
    if (inPortfolio) return false;
    var search = assetSearch.toLowerCase();
    return k.symbol.toLowerCase().indexOf(search) >= 0 || k.name.toLowerCase().indexOf(search) >= 0;
  });
  var allSymbols = assets.map(function(a) { return a.symbol; });

  var statusDot   = priceStatus === "live" ? "#22c55e" : priceStatus === "error" ? "#ef4444" : "#f59e0b";
  var statusLabel = priceStatus === "live" ? "Live" : priceStatus === "error" ? "Offline" : "Loading...";

  return (
    <div style={{ fontFamily:"'DM Mono','Courier New',monospace", background:"#080c14",
      minHeight:"100vh", display:"flex", justifyContent:"center", alignItems:"flex-start", padding:"20px 0" }}>

      <div style={{ width:390, minHeight:780, background:"#0d1117", borderRadius:44, overflow:"hidden",
        boxShadow:"0 0 0 1px #1e2a3a, 0 40px 120px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.05)",
        position:"relative", display:"flex", flexDirection:"column" }}>

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center",
          padding:"14px 28px 0", color:"#fff", fontSize:12, fontWeight:500 }}>
          <span>9:41</span>
          <div style={{ width:120, height:30, background:"#0d1117", borderRadius:20,
            position:"absolute", left:"50%", transform:"translateX(-50%)", top:0 }} />
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            <span>WiFi</span><span>100%</span>
          </div>
        </div>

        <div style={{ padding:"16px 24px 12px", borderBottom:"1px solid #1a2332", position:"relative" }}>

                    </div>
                    <div style={{ fontFamily:"'Syne',sans-serif", fontSize:16, fontWeight:700, color:"#e2f0ff", lineHeight:1.4, marginBottom:12 }}>{selectedNews.title}</div>
                    <div style={{ fontSize:13, color:"#94a3b8", lineHeight:1.6, marginBottom:16 }}>{selectedNews.summary}</div>
                    <div style={{ background:sentimentBg[selectedNews.sentiment],
                      border:"1px solid " + sentimentColor[selectedNews.sentiment] + "44",
                      borderRadius:12, padding:"12px 14px" }}>
                      <div style={{ fontSize:11, color:sentimentColor[selectedNews.sentiment], marginBottom:6, fontWeight:500, letterSpacing:0.5 }}>AI ADVICE</div>
                      <div style={{ fontSize:13, color:"#cbd5e1", lineHeight:1.5 }}>{selectedNews.advice}</div>
                    </div>
                  </div>
                </div>
              ) : (
                <div>
                  <div style={{ fontSize:11, color:"#4a6080", marginBottom:12, letterSpacing:1 }}>TODAY'S BRIEFING</div>
                  {NEWS.map(function(n) {
                    return (
                      <button key={n.id} onClick={function(){ setSelectedNews(n); }}
                        style={{ width:"100%", background:"#111822", border:"1px solid #1a2a3a",
                          borderRadius:12, padding:"14px", marginBottom:10, cursor:"pointer", textAlign:"left" }}>
                        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                          <span style={{ background:"#1a2a3a", color:"#60a5fa", padding:"2px 8px", borderRadius:6, fontSize:11 }}>{n.symbol}</span>
                          <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                            <span style={{ width:6, height:6, borderRadius:"50%", background:sentimentColor[n.sentiment], display:"inline-block" }} />
                            <span style={{ fontSize:11, color:"#4a6080" }}>{n.time}</span>
                          </div>
                        </div>
                        <div style={{ fontSize:13, fontWeight:500, color:"#cbd5e1", lineHeight:1.4, marginBottom:6 }}>{n.title}</div>
                        <div style={{ fontSize:11, color:"#4a6080" }}>Tap for AI advice</div>
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          )}
        </div>

        <div style={{ position:"absolute", bottom:0, left:0, right:0,
          background:"rgba(13,17,23,0.95)", backdropFilter:"blur(20px)",
          borderTop:"1px solid #1a2332", padding:"8px 0 24px", display:"flex", justifyContent:"space-around" }}>
          {[{key:"portfolio",label:"Portfolio"},{key:"alerts",label:"Alerts"},{key:"news",label:"News"}].map(function(t) {
            return (
              <button key={t.key} onClick={function(){ setTab(t.key); }}
                style={{ background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column",
                  alignItems:"center", gap:2, opacity:tab === t.key ? 1 : 0.4, transition:"opacity 0.2s" }}>
                <span style={{ fontSize:10, color:tab === t.key ? "#3b82f6" : "#4a6080" }}>{t.label}</span>
              </button>
            );
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App, null));
</script>
</body>
</html>
